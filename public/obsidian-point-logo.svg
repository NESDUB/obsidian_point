      <rect x="0" y="0" width="66" height="210" fill="url(#leftBodySheen160)"/>
      <line x1="66" y1="0" x2="66" y2="210" stroke="#FFFFFF" stroke-opacity="0.34" stroke-width="1"/>
      <line x1="65" y1="0" x2="65" y2="210" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1"/>
    </g>

    <g clip-path="url(#leftStripClip)">
      <rect x="66" y="0" width="4" height="210" fill="url(#leftStripBase120)"/>
      <rect x="66" y="0" width="4" height="210" fill="url(#leftStripVertical180)"/>
      <rect x="66" y="0" width="4" height="210" fill="url(#leftStripRadial)"/>
      <rect x="66" y="0" width="4" height="210" fill="url(#leftStripSecondary28)"/>
      <rect x="66" y="0" width="4" height="210" fill="url(#leftStripMain154)"/>
      <line x1="66" y1="0" x2="66" y2="210" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="1"/>
      <line x1="70" y1="0" x2="70" y2="210" stroke="#000000" stroke-opacity="0.18" stroke-width="1"/>
    </g>

    <rect x="70" y="0" width="10" height="210" fill="url(#centerSpine90)"/>
    <line x1="70" y1="0" x2="70" y2="210" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="1"/>
    <line x1="80" y1="0" x2="80" y2="210" stroke="#000000" stroke-opacity="0.32" stroke-width="1"/>

    <g clip-path="url(#rightStripClip)">
      <rect x="80" y="0" width="4" height="210" fill="url(#rightStripBase120)"/>
      <rect x="80" y="0" width="4" height="210" fill="url(#rightStripVertical180)"/>
      <rect x="80" y="0" width="4" height="210" fill="url(#rightStripRadial)"/>
      <rect x="80" y="0" width="4" height="210" fill="url(#rightStripSecondary42)"/>
      <rect x="80" y="0" width="4" height="210" fill="url(#rightStripMain136)"/>
      <line x1="80" y1="0" x2="80" y2="210" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="1"/>
      <line x1="84" y1="0" x2="84" y2="210" stroke="#000000" stroke-opacity="0.18" stroke-width="1"/>
    </g>

    <g clip-path="url(#rightMonolithClip)">
