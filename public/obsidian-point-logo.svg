<?xml version="1.0" encoding="UTF-8"?>
<svg width="271.4286" height="380" viewBox="0 0 150 210" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Obsidian Point Ultra Logo — CSS Matched Gradients</title>
  <desc>SVG export matching the React/CSS gradient angles and layered reflection design.</desc>

  <defs>
    <clipPath id="leftMonolithClip">
      <polygon points="66 0 66 210 0 210 15.84 113.4"/>
    </clipPath>

    <clipPath id="rightMonolithClip">
