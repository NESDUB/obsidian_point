      <stop offset="45%" stop-color="#0F1317"/>
      <stop offset="100%" stop-color="#1B1F24"/>
    </linearGradient>

    <filter id="logoDropShadow" x="-35%" y="-20%" width="170%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="5.526" stdDeviation="4.974" flood-color="#000000" flood-opacity="0.06"/>
      <feDropShadow dx="0" dy="13.263" stdDeviation="9.947" flood-color="#000000" flood-opacity="0.045"/>
    </filter>
  </defs>

  <g filter="url(#logoDropShadow)">
    <g clip-path="url(#leftMonolithClip)">
