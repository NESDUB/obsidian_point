    <!-- Left monolith: 160deg sheen -->
    <linearGradient id="leftBodySheen160" x1="-4.6066" y1="1.6767" x2="70.6066" y2="208.3233" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity=".16"/>
      <stop offset="10%" stop-color="#FFFFFF" stop-opacity=".05"/>
      <stop offset="24%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
