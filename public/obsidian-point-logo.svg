    <!-- Left strip: radial bloom -->
    <radialGradient id="leftStripRadial" cx="68.56" cy="29.4" r="75" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity=".24"/>
      <stop offset="14%" stop-color="#FFFFFF" stop-opacity=".14"/>
      <stop offset="24%" stop-color="#D6E0EC" stop-opacity=".09"/>
      <stop offset="40%" stop-color="#D6E0EC" stop-opacity="0"/>
