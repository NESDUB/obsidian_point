      <stop offset="24%" stop-color="#D6E0EC" stop-opacity=".08"/>
      <stop offset="40%" stop-color="#D6E0EC" stop-opacity="0"/>
      <stop offset="100%" stop-color="#D6E0EC" stop-opacity="0"/>
