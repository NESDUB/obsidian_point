      <stop offset="38%" stop-color="#FFFFFF" stop-opacity=".09"/>
      <stop offset="46%" stop-color="#E8EEF5" stop-opacity=".24"/>
      <stop offset="51%" stop-color="#AEBCCC" stop-opacity=".28"/>
      <stop offset="57%" stop-color="#67798D" stop-opacity=".22"/>
      <stop offset="63%" stop-color="#272F39" stop-opacity=".13"/>
