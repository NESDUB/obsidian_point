    <linearGradient id="rightStripMain136" x1="28.5669" y1="49.6684" x2="135.4331" y2="160.3316" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="20%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="29%" stop-color="#FFFFFF" stop-opacity=".03"/>
      <stop offset="36%" stop-color="#FFFFFF" stop-opacity=".075"/>
      <stop offset="45%" stop-color="#E6ECF3" stop-opacity=".20"/>
      <stop offset="52%" stop-color="#A6B6C6" stop-opacity=".28"/>
      <stop offset="58%" stop-color="#65788E" stop-opacity=".25"/>
