      <stop offset="58%" stop-color="#FFFFFF" stop-opacity=".045"/>
      <stop offset="62%" stop-color="#FFFFFF" stop-opacity=".018"/>
      <stop offset="66%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
