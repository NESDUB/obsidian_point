      <rect x="84" y="0" width="66" height="210" fill="url(#rightBodySheen200)"/>
      <line x1="84" y1="0" x2="84" y2="210" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="1"/>
      <line x1="85" y1="0" x2="85" y2="210" stroke="#FFFFFF" stroke-opacity="0.34" stroke-width="1"/>
