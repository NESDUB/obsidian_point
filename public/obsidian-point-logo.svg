    <linearGradient id="leftBodyBase138" x1="-33.9877" y1="30.6026" x2="99.9877" y2="179.3974" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F4EFE6" stop-opacity=".26"/>
      <stop offset="26%" stop-color="#767E88" stop-opacity=".16"/>
      <stop offset="52%" stop-color="#22272D" stop-opacity=".88"/>
      <stop offset="100%" stop-color="#080A0C" stop-opacity="1"/>
    </linearGradient>

    <!-- Right monolith: 200deg sheen -->
    <linearGradient id="rightBodySheen200" x1="154.6066" y1="1.6767" x2="79.3934" y2="208.3233" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity=".16"/>
      <stop offset="10%" stop-color="#FFFFFF" stop-opacity=".05"/>
      <stop offset="24%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

